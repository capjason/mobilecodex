<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MobileCodex" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>MobileCodex</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/web/src/main.jsx"></script>
    <script>
      const mobileCodexBuild = "2026-05-03-tool-card-id-v8";
      if ("serviceWorker" in navigator) {
        let refreshing = false;
        const hadController = Boolean(navigator.serviceWorker.controller);
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (!hadController) return;
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
        window.addEventListener("load", () => {
          navigator.serviceWorker.register(`/sw.js?v=${mobileCodexBuild}`).then((registration) => {
            registration.update();
            if (registration.waiting) registration.waiting.postMessage({ type: "SKIP_WAITING" });
          });
        });
      }
    </script>
  </body>
</html>
